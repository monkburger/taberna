# taberna.toml - Taberna server configuration
#
# Taberna is a TLS-only, HTTP/3-first static file server.
# Plain HTTP is not supported. TLS 1.3 is the minimum and only version.
#
# Each listen entry opens a TCP (HTTPS) + UDP (QUIC/HTTP/3) socket pair.
# Supported formats:
#
#   "443"              - port only, binds to 0.0.0.0 (all IPv4)
#   "*:443"            - all IPv4 interfaces, port 443 (same as above)
#   "[::]:443"         - all IPv6 interfaces, port 443
#   "127.0.0.1:8443"   - specific IPv4 address
#   "[::1]:8443"       - specific IPv6 address (must be bracketed)
#   "localhost:8443"   - hostname
#
# Multiple entries are allowed; each gets its own listener pair.

[server]
listen = [
    "*:443",          # all IPv4, standard HTTPS port
    "[::]:443",       # all IPv6, standard HTTPS port
    # "127.0.0.1:8443",
]

# Optional: path to a custom mime.types file (layered on top of built-ins and
# any readable system file such as /etc/mime.types).
# mime_types = "/etc/taberna/mime.types"

# ---------------------------------------------------------------------------
# Logging
#
# access_log / error_log accept:
#   ""        or "stderr" -> write to stderr (default)
#   "off"                 -> discard / silence
#   "/path"               -> append to that file (created if missing, mode 0640)
#
# access_log: one JSON record per completed request (slog JSONHandler).
#   Fields: time, level, msg ("request"), remote (IP:port, or the forwarded
#           client IP when behind a trusted proxy), proto, method, uri,
#           status (int), bytes (int), duration (nanoseconds), ua (User-Agent).
#   Sample:
#     {"time":"2026-01-01T00:00:00Z","level":"INFO","msg":"request",
#      "remote":"203.0.113.5:52341","proto":"HTTP/3.0","method":"GET",
#      "uri":"/index.html","status":200,"bytes":4096,
#      "duration":312000,"ua":"Mozilla/5.0 (compatible; ...)"}
#   Compatible with Loki, Datadog, Elastic/OpenSearch, Vector, Splunk, etc.
#
# error_log: human-readable key=value text lines (slog TextHandler).
#   Sample:
#     time=2026-01-01T00:00:00.000Z level=INFO msg=listening addr=0.0.0.0:443
# ---------------------------------------------------------------------------
access_log = ""           # e.g. "/var/log/taberna/access.log"
error_log  = ""           # e.g. "/var/log/taberna/error.log"

# ---------------------------------------------------------------------------
# Timeouts (Go duration strings: "5s", "1m", "1m30s")
# Defaults shown below are conservative and suitable for most deployments.
# Tighten read_header_timeout and read_timeout on heavily constrained devices.
# ---------------------------------------------------------------------------
read_header_timeout = "5s"    # time to receive the full request headers
read_timeout        = "30s"   # time to receive the full request (headers + body)
write_timeout       = "60s"   # time to send the full response
idle_timeout        = "120s"  # keep-alive idle time before closing connection
shutdown_timeout    = "10s"   # grace period for in-flight requests on SIGTERM/SIGINT

# ---------------------------------------------------------------------------
# Connection / header size limits
# max_header_bytes: maximum size of request headers in bytes (default 64 KB).
# max_connections:  maximum concurrent TCP connections per listen address.
#                   -1 = unlimited (not recommended in production).
#                   0  = use default (512).
#                   On embedded devices, set to a value matching available RAM.
# ---------------------------------------------------------------------------
max_header_bytes = 65536
max_connections  = 512

# ---------------------------------------------------------------------------
# Security response headers
# These are applied to every response regardless of virtual host.
# Set a field to "" to suppress that header (not recommended for HSTS or
# content_type_options on a TLS-only server).
# ---------------------------------------------------------------------------
[server.security]
hsts                    = "max-age=63072000; includeSubDomains; preload"
content_type_options    = "nosniff"
frame_options           = "DENY"           # or "SAMEORIGIN" for framed apps
content_security_policy = "default-src 'self'"
referrer_policy         = "strict-origin-when-cross-origin"
permissions_policy      = ""               # empty = header not sent

# Cross-origin isolation headers. Together these three enable the cross-origin
# isolated browsing context required for SharedArrayBuffer and high-resolution
# performance timers (performance.now(), Atomics.wait(), etc.).
# Leave empty ("") to suppress a header entirely (the default).
#
# Set all three for full isolation:
#   cross_origin_opener_policy   = "same-origin"
#   cross_origin_embedder_policy = "require-corp"
#   cross_origin_resource_policy = "same-origin"    # or "same-site" / "cross-origin"
cross_origin_opener_policy   = ""   # same-origin | same-origin-allow-popups | unsafe-none
cross_origin_embedder_policy = ""   # require-corp | credentialless | unsafe-none
cross_origin_resource_policy = ""   # same-origin | same-site | cross-origin

# ---------------------------------------------------------------------------
# Unix domain socket (optional)
#
# When enabled, Taberna opens a plain HTTP/1.1 listener on the given Unix socket
# path in addition to the TLS/QUIC listeners.  This is intended for local
# reverse-proxy setups (e.g. nginx or haproxy in front of Taberna) or for
# inter-process communication where TLS overhead is unnecessary.
#
# enabled  - set to true to activate the listener (default: false).
# path     - filesystem path of the socket (must be non-empty when enabled).
#            Created on startup; removed cleanly on graceful shutdown.
# mode     - file permission bits applied to the socket after creation.
#            0660 allows the owner and group to connect (default).
#            0600 restricts to the owner only.
#            0666 is open to all local users (use with caution).
# ---------------------------------------------------------------------------
# [server.unix]
# enabled = true
# path    = "/run/taberna/taberna.sock"
# mode    = 0660


# ---------------------------------------------------------------------------
# Virtual hosts
#
# Each [[vhost]] block defines one virtual host.
# server_names accepts:
#   * exact names - "example.com", "www.example.com"
#   * single-level wildcards - "*.example.com"
#     (matches api.example.com but NOT sub.api.example.com)
#
# Every vhost requires a dedicated TLS certificate and private key.
# Wildcard certificates must be issued for the wildcard name in server_names.
# ---------------------------------------------------------------------------

[[vhost]]
server_names  = ["example.com", "www.example.com"]
document_root = "/var/www/example"
dir_listing   = false   # true to enable directory browsing (default: false)
# index_files is the ordered list of filenames tried when a directory is
# requested. Defaults to ["index.html"] if omitted.
# index_files = ["index.html", "index.htm", "default.html"]

# Cache-Status: taberna; fwd=miss (RFC 9211) - useful when sitting behind a
# CDN that uses Cache-Status for diagnostics. Default: false.
# cache_status = false

  [vhost.tls]
  cert  = "/etc/taberna/certs/example.com.crt"
  key   = "/etc/taberna/certs/example.com.key"
  # chain is optional. Use it when cert contains only the leaf certificate and
  # your intermediates are stored separately. PEM file with one or more
  # intermediate CA certs in order (issuing intermediate first).
  # Do NOT include the root CA; it wastes handshake bytes and clients ignore it.
  # If cert is already a full-chain bundle (e.g. Let's Encrypt fullchain.pem)
  # leave chain empty.
  # chain = "/etc/taberna/certs/example.com.chain.pem"


[[vhost]]
# Wildcard vhost: matches any immediate subdomain of apps.internal.
# e.g. api.apps.internal, dashboard.apps.internal
server_names  = ["*.apps.internal"]
document_root = "/var/www/apps"
dir_listing   = false

  [vhost.tls]
  # The certificate must be a wildcard cert issued for *.apps.internal.
  cert  = "/etc/taberna/certs/wildcard.apps.internal.crt"
  key   = "/etc/taberna/certs/wildcard.apps.internal.key"
  chain = "/etc/taberna/certs/wildcard.apps.internal.chain.pem"

# ---------------------------------------------------------------------------
# Pre-compressed files (no configuration required)
#
# Drop sidecars next to any file and taberna serves them automatically to
# clients that support those encodings. Priority: brotli -> zstd -> gzip.
#
#   <file>.br   -> Content-Encoding: br    (Brotli)
#   <file>.zst  -> Content-Encoding: zstd  (Zstandard; Chrome 118+, Firefox 126+)
#   <file>.gz   -> Content-Encoding: gzip
#
# Generate at deploy time (keep the original with -k):
#   brotli  -k /var/www/example/app.js
#   zstd    -k /var/www/example/app.js
#   gzip    -k /var/www/example/app.js
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Compression Dictionary Transport (RFC 9842) (no configuration required)
#
# Drop these sidecars next to any file to enable dictionary-compressed serving.
# Browsers that already hold the dictionary can download only the diff.
#
#   <file>.dict  - one-line URL match pattern; marks <file> as a dictionary.
#                  taberna adds:  Use-As-Dictionary: match="<pattern>"
#   <file>.dcz   - dictionary-compressed Zstandard of <file>
#   <file>.dcb   - dictionary-compressed Brotli of <file>
#   <file>.dh    - SF Bytes SHA-256 hash of the dictionary, e.g. ":HASH=:"
#
# Generate at deploy time (example using zstd, app.v1.js as dictionary for
# the next release app.v2.js):
#
#   echo "/js/app.*.js" > /var/www/js/app.v1.js.dict
#
#   zstd -D app.v1.js app.v2.js -o /var/www/js/app.v2.js.dcz
#
#   printf ":%s:" "$(openssl dgst -sha256 -binary app.v1.js | base64 -w0)" \
#     > /var/www/js/app.v2.js.dh
#
# Clients without dictionary support receive the pre-compressed fallback or
# the uncompressed original transparently.
# ---------------------------------------------------------------------------
